services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Dev@Password123!"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Dev@Password123!" -Q "SELECT 1" -C -b
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  api:
    container_name: teeforce-api
    build:
      context: .
      dockerfile: src/backend/Teeforce.Api/Dockerfile
      target: dev
    ports:
      - "5221:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=db;Database=Teeforce;User Id=sa;Password=Dev@Password123!;TrustServerCertificate=True"
      Cors__AllowedOrigins__0: "http://localhost:3000"
      # Auth__UseDevAuth intentionally not set here — manual dev uses real Entra auth.
      # E2E tests need DevAuth on; set it via a docker-compose override or export before `make e2e`.
    volumes:
      - ./src/backend:/app
      - api_obj:/app/Teeforce.Api/obj
      - api_bin:/app/Teeforce.Api/bin
      - domain_obj:/app/Teeforce.Domain/obj
      - domain_bin:/app/Teeforce.Domain/bin
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqldata:
  api_obj:
  api_bin:
  domain_obj:
  domain_bin:
