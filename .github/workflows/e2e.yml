name: E2E Tests

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy Test"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      RESOURCE_GROUP: shadowbrook-test-rg
      CONTAINER_APP_NAME: shadowbrook-app-test
      SWA_NAME: shadowbrook-web-test
    steps:
      - uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve test environment URLs
        id: urls
        run: |
          API_FQDN=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn \
            --output tsv)
          echo "api_url=https://$API_FQDN" >> "$GITHUB_OUTPUT"

          WEB_HOSTNAME=$(az staticwebapp show \
            --name ${{ env.SWA_NAME }} \
            --query defaultHostname \
            --output tsv)
          echo "base_url=https://$WEB_HOSTNAME" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: src/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir src/web install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --dir src/web exec playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          E2E_BASE_URL: ${{ steps.urls.outputs.base_url }}
          E2E_API_URL: ${{ steps.urls.outputs.api_url }}
        run: pnpm --dir src/web e2e

      - name: Upload test report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: src/web/e2e/playwright-report/
          retention-days: 14

      - name: Upload trace artifacts
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: playwright-traces
          path: src/web/e2e/test-results/
          retention-days: 14
