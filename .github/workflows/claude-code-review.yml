name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    # Cancel stale reviews when new commits are pushed
    concurrency:
      group: review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Check if PR is agentic
        id: check-agentic
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels --jq '.labels[].name')
          if echo "$LABELS" | grep -q "^agentic$"; then
            echo "agentic=true" >> $GITHUB_OUTPUT
          else
            echo "agentic=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for redundant review
        id: check-redundant
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          PR=${{ github.event.pull_request.number }}
          BOT_LOGIN="benjamingolfco-claude-agent[bot]"

          # Get the bot's most recent review
          LAST_REVIEW=$(gh api "repos/${{ github.repository }}/pulls/$PR/reviews" \
            --jq "[.[] | select(.user.login == \"$BOT_LOGIN\")] | sort_by(.submitted_at) | last // empty")

          if [ -z "$LAST_REVIEW" ]; then
            echo "No prior bot review — running full review."
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "follow_up=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          REVIEW_STATE=$(echo "$LAST_REVIEW" | jq -r '.state')
          REVIEW_TIME=$(echo "$LAST_REVIEW" | jq -r '.submitted_at')

          echo "Last bot review: state=$REVIEW_STATE at $REVIEW_TIME"

          # If the last review requested changes, always re-review
          if [ "$REVIEW_STATE" = "CHANGES_REQUESTED" ]; then
            echo "Last review requested changes — running follow-up review."
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "follow_up=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Only skip if the last review was an explicit APPROVED — COMMENTED reviews
          # (including fallback "no issues found" comments) should not prevent re-review
          if [ "$REVIEW_STATE" != "APPROVED" ]; then
            echo "Last review was $REVIEW_STATE (not APPROVED) — running full review."
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "follow_up=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count commits after the last approved review
          NEW_COMMITS=$(gh api "repos/${{ github.repository }}/pulls/$PR/commits" \
            --jq "[.[] | select(.commit.committer.date > \"$REVIEW_TIME\")] | length")

          echo "New commits since last approved review: $NEW_COMMITS"

          if [ "$NEW_COMMITS" = "0" ]; then
            echo "No new commits since last approved review — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "follow_up=false" >> $GITHUB_OUTPUT
          else
            echo "New commits found — running follow-up review."
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "follow_up=true" >> $GITHUB_OUTPUT
          fi

      - name: Run Code Reviewer
        if: steps.check-redundant.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.app-token.outputs.token }}
          allowed_bots: "benjamingolfco-claude-agent[bot]"
          additional_permissions: |
            actions: read
          claude_args: |
            --model claude-sonnet-4-5-20250929 --allowedTools "Bash" "Read" "Write" "Edit" "Glob" "Grep"
          prompt: |
            Read and follow .claude/agents/reviewer.md for your role.
            Review PR #${{ github.event.pull_request.number }}

            Title: ${{ github.event.pull_request.title }}
            Agentic: ${{ steps.check-agentic.outputs.agentic }}
            Follow-up review: ${{ steps.check-redundant.outputs.follow_up }}

            If Follow-up review is true:
            - This is a re-review after new commits were pushed. Focus ONLY on the new changes.
            - Keep your review concise — a few sentences if everything looks good.
            - Do NOT repeat feedback from prior reviews unless it was not addressed.

            If Agentic is true:
            - Use `gh pr review --request-changes` when issues are found
            - Use `gh pr review --approve` when the review passes
            If Agentic is false:
            - Always use `gh pr review --comment` (never request-changes or approve)

            CRITICAL: You MUST post a review via `gh pr review` before finishing. This is required for the pipeline to advance. If you fail to post a review, the pipeline will stall indefinitely.

      - name: Ensure review was posted
        if: always() && steps.check-redundant.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Check if a review was posted during THIS workflow run (not just any prior review)
          RUN_START="${{ github.event.pull_request.updated_at }}"
          RECENT_REVIEW=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
            --jq "[.[] | select(.user.login == \"benjamingolfco-claude-agent[bot]\" and .submitted_at > \"$RUN_START\")] | length")
          if [ "$RECENT_REVIEW" = "0" ]; then
            echo "::warning::Code reviewer did not post a review. Posting fallback."
            gh pr review ${{ github.event.pull_request.number }} --comment \
              --body "Code review incomplete — reviewer agent did not post a review. Please re-run the workflow or review manually."
          else
            echo "Review was posted successfully ($RECENT_REVIEW review(s) found)."
          fi
